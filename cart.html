<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/css/style.css"></link>
    <title>Add to Cart</title>
</head>
<body>
    <header>
        <h1>ShopEasy</h1>
    </header>
    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart</a>
        <a href="login.html">Login</a>
    </nav>
    <div class="container">
        <h2>Your Shopping Cart</h2>
        <br>
        <table>
            <tr>
                <th>Product</th>
                <th>Name</th>
                <th>Price</th>
                <th>Quaatity</th>
                <th>Total</th>
                <th>Action</th>
            </tr>
            <tr>
                <td><img src="static/image/smart watch.webp" alt="Watch"></td>
                <td>Smart Watch</td>
                <td>₹2,499</td>
                <td><input type="number" value="1" min="1" </td>
                <td>₹2,499</td>
                <td><button class="remove">Remove</button> </td>
            </tr>
            <tr>
                <td><img src="static/image/hardphone.webp" alt="Headphones"> </td>
                <td>Headphones</td>
                <td>₹1,499</td>
                <td><input type="number" value="1" min="1" </td>
                <td>1,499</td>
                <td> <button class="remove">Remove</button> </td>

            </tr>
        </table>
        <div class="summary">
            <h2>Grand Total: ₹3,998</h2>
            <a href="checkout.html">
                <button class="checkout">Proceed to checkout</button>
            </a>
        </div>
    </div>
    <footer>
        <p>@ 2026 shopEasy . All Right Reserved</p>
    </footer>
      <script src="static/js/script.js"></script>
</body>
</html>
